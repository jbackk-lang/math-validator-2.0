name: M2 Topological Loop Matrix CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-topology:
    runs-on: ubuntu-latest

    steps:
    # 1. Klonowanie repozytorium na maszynę wirtualną GitHuba
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Setup izolowanego środowiska Python 3.11
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Instalacja niskopoziomowych zależności matematycznych dla feldcore
    - name: Install Field Core Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy

    # 4. Automatyczna weryfikacja integralności struktury plików
    - name: Verify Core Integrity
      run: |
        echo "=== Sprawdzanie obecności komponentów trzonu ==="
        python -c "
        import os
        required = ['validator.py', 'pc_model_simulator.py', 'closed_loop_pipeline.py']
        missing = [f for f in required if not os.path.exists(f)]
        if missing:
            print(f'🔴 BŁĄD ARCHITEKTURY: Brak plików {missing}'); exit(1)
        print('🟢 Trzon Gia-Tmdr-feldcore kompletny strukturalnie.')
        "

    # 5. Odpalenie zamkniętej pętli adaptacyjnej (Test Osobliwości, Möbiusa i Stabilizacji)
    - name: Run Closed Loop Adaptation Pipeline
      run: |
        echo "=== Uruchamianie silnika walidacji topologicznej ==="
        python closed_loop_pipeline.py

    # 6. Raport końcowy
    - name: System Status Report
      if: success()
      run: echo "🚀 [M²-CLOSURE SUCCESSFUL] Wszystkie filtry przeszły weryfikację. Kod jest bezpieczny."
