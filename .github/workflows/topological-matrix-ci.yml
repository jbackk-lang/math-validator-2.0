name: M2 Topological Loop Matrix CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-topology:
    runs-on: ubuntu-latest

    steps:
    # 1. Klonowanie głównego repozytorium (math-validator-2.0)
    - name: Checkout Validator Repo
      uses: actions/checkout@v4
      with:
        path: '.'

    # 2. Klonowanie repozytorium z geometrią (TRM-Geometry-Core) do folderu src
    - name: Checkout TRM Geometry Core
      uses: actions/checkout@v4
      with:
        repository: 'jbackk-lang/TRM-Geometry-Core'
        path: 'trm_core'

    # 3. Przeniesienie plików geometrii do głównego katalogu, aby importy Pythona zadziałały
    - name: Link Geometry Source Files
      run: |
        cp trm_core/src/*.py .
        echo "🟢 Pliki geometrii TRM zostały zintegrowane z rdzeniem walidatora."

    # 4. Setup środowiska Python
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 5. Instalacja zależności matematycznych
    - name: Install Field Core Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy

    # 6. Automatyczna weryfikacja integralności połączonej struktury
    - name: Verify Core Integrity
      run: |
        echo "=== Sprawdzanie obecności komponentów połączonych ==="
        python -c "
        import os
        required = ['validator.py', 'closed_loop_pipeline.py', 'transitions.py', 'quadrature.py']
        missing = [f for f in required if not os.path.exists(f)]
        if missing:
            print(f'🔴 BŁĄD ARCHITEKTURY: Brak plików {missing}'); exit(1)
        print('🟢 Pełna struktura połączona pomyślnie.');
        "

    # 7. Odpalenie zamkniętej pętli adaptacyjnej (Test geometrii i stabilizacji)
    - name: Run Closed Loop Adaptation Pipeline
      run: |
        echo "=== Uruchamianie zintegrowanego silnika walidacji ==="
        python closed_loop_pipeline.py

    # 8. Raport końcowy
    - name: System Status Report
      if: success()
      run: echo "🚀 [M²-CLOSURE SUCCESSFUL] Wszystkie filtry przeszły weryfikację geometryczną."
